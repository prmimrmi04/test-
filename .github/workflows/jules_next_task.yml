name: Jules Next Task

on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  next-task:
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.merged == true

    steps:
      - name: Trigger Google Jules
        run: |
          PROMPT=$(cat <<'EOF'
          You are working in this GitHub repository.

          Read AGENTS.md and agent_tasks.json.
          Find the first task with status "todo".
          Implement only that task.

          Rules:
          - Respect allowed_paths from the selected task.
          - Update agent_tasks.json and set the completed task status to "done".
          - After completing the task, add one new low-risk todo task to agent_tasks.json.
          - Run python scripts/validate_agent_tasks.py agent_tasks.json.
          - Run pytest.
          - Open one pull request with the changes.
          EOF
          )

          curl -f "https://jules.googleapis.com/v1alpha/sessions" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Goog-Api-Key: ${{ secrets.JULES_API_KEY }}" \
            -d "$(jq -n \
              --arg prompt "$PROMPT" \
              --arg source "sources/github/${{ github.repository }}" \
              '{
                "prompt": $prompt,
                "sourceContext": {
                  "source": $source,
                  "githubRepoContext": {
                    "startingBranch": "main"
                  }
                },
                "automationMode": "AUTO_CREATE_PR",
                "title": "Run next agent task"
              }')"
